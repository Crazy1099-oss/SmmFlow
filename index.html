<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmmFlow</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="nav-wraper">
        <div class="nav">
            <div class="nav-nemu">
                <a class="logo-wraper-links" href="№"><img src="./image/icons/logo.svg" alt="SMMFLOW">SMM<span
                        class="logo-strong">FLOW</span></a>
                <a href="№">Услуги</a>
                <a href="№">Преимущества</a>
                <a href="№">Отзывы</a>
            </div>
            <div class="nav-auth-actions">
                <button class="btn-register">Войти</button>
                <button class="btn">Быстрый заказ</button>
            </div>
        </div>
    </div>

    <div class="container">
        <header class="header">
            <div class="header-title">
                <h1>Продвижение во всех соцсетях за пару кликов</h1>
                <p>
                    Получайте подписчиков, лайки, репосты, просмотры,
                    прослушивания и любую другую активность на свои профили
                    в социальных сетях по самым низким ценами на рынке и в самые быстрые сроки!
                </p>
                <button class="btn">Начать продвижение</button>
                <img src="./image/environment/people1.svg" alt="Продвижение соцсетей">
            </div>
        </header>
    </div>

    <div class="quick-order-wraper">
        <div class="container">
            <h2>Быстрый заказ</h2>
            <div class="quick-order-social_media">
                <button class="btn-social_media"><img src="./image/icons/instagram.svg"
                        alt="instagram">Instagram</button>
                <button class="btn-social_media"><img src="./image/icons/vk.svg" alt="vk">Instagram</button>
                <button class="btn-social_media"><img src="./image/icons/TikTiok.svg" alt="TikTiok">Instagram</button>
                <button class="btn-social_media"><img src="./image/icons/Telegram.svg" alt="Telegram">Instagram</button>
                <button class="btn-social_media"><img src="./image/icons/YouTube.svg" alt="YouTube">Instagram</button>
                <button class="btn-social_media"><img src="./image/icons/FaceBook.svg" alt="FaceBook">Instagram</button>
                <button class="btn-social_media"><img src="./image/icons/Twitch.svg" alt="Twitch">Instagram</button>
            </div>
            
            <div class="quick-order-services">
                <button class="services-box">
                    <div>🙋‍♂️</div>
                    <span>Подписчики</span>
                </button>
                <button class="services-box">
                    <div>❤️</div>
                    <span>Лайки</span>
                </button>
                <button class="services-box">
                    <div>👀</div>
                    <span>Просмотры</span>
                </button>
                <button class="services-box">
                    <div>💬</div>
                    <span>Комментарии</span>
                </button>
                <button class="services-box">
                    <div>📷</div>
                    <span>Просмотры</span>
                </button>
                <button class="services-box">
                    <div>💁‍♀️</div>
                    <span>Зрители в прямой эфир</span>
                </button>
                <button class="services-box">
                    <div>📈</div>
                    <span>Статистика</span>
                </button>
                <button class="services-box">
                    <div>🎬</div>
                    <span>IGTV</span>
                </button>
                <button class="services-box">
                    <div>💥</div>
                    <span>Reels</span>
                </button>
            </div>
        </div>
    </div>
</body>

</html>
